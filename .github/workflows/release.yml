name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            platform: macos-latest
            args: --bundles dmg
            artifact: codex-x-macos
            paths: |
              apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux
            platform: ubuntu-22.04
            args: --bundles deb,rpm
            artifact: codex-x-linux
            paths: |
              apps/desktop/src-tauri/target/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
          - name: Windows
            platform: windows-latest
            args: --bundles msi
            artifact: codex-x-windows
            paths: |
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles
        run: pnpm --dir apps/desktop tauri build ${{ matrix.args }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        id: release_notes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          tag = os.environ["GITHUB_REF_NAME"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{re.escape(tag)}\].*?\n(.*?)(?=^## \[|\Z)",
              text,
              flags=re.S | re.M,
          )
          body = match.group(1).strip() if match else ""
          if not body:
              body = "Codex-X desktop release."
          with open("release-body.md", "w", encoding="utf-8") as fh:
              fh.write(body + "\n")
          PY

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="Codex-X ${tag}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file release-body.md --latest
          else
            gh release create "$tag" --title "$title" --notes-file release-body.md --latest
          fi
          gh release upload "$tag" release-assets/* --clobber

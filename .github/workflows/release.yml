name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag matching the app version (for example v0.2.36)
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --bundles app,dmg
            artifact: codex-x-macos-arm64
          - name: macOS Intel
            platform: macos-15-intel
            args: --bundles app,dmg
            artifact: codex-x-macos-x64
          - name: Linux
            platform: ubuntu-22.04
            args: --bundles deb,rpm
            artifact: codex-x-linux
          - name: Windows
            platform: windows-latest
            args: --bundles msi
            artifact: codex-x-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "Missing TAURI_SIGNING_PRIVATE_KEY repository secret" >&2; exit 1; }
          test -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" || { echo "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD repository secret" >&2; exit 1; }
          python3 scripts/validate_updater_release.py --config-only

      - name: Validate release version
        run: |
          version=$(node -p "require('./apps/desktop/package.json').version")
          test "$RELEASE_TAG" = "v$version" || { echo "Release tag $RELEASE_TAG does not match app version $version" >&2; exit 1; }

      - name: Build Tauri bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --dir apps/desktop tauri build ${{ matrix.args }}

      - name: Create Windows portable zip
        if: matrix.platform == 'windows-latest'
        run: |
          set -euo pipefail
          version=$(node -p "require('./apps/desktop/package.json').version")
          portable_dir="apps/desktop/src-tauri/portable/Codex-X_${version}_windows_x64_portable"
          rm -rf "apps/desktop/src-tauri/portable"
          mkdir -p "$portable_dir"
          cp apps/desktop/src-tauri/target/release/codex-x.exe "$portable_dir/Codex-X.exe"
          cat > "$portable_dir/README-portable.txt" <<'EOF'
          Codex-X Windows Portable

          Double click Codex-X.exe to run. No MSI installation is required.
          Microsoft Edge WebView2 Runtime is required; Windows 10/11 usually already includes it.
          EOF
          powershell -NoProfile -Command "Compress-Archive -Path 'apps/desktop/src-tauri/portable/Codex-X_${version}_windows_x64_portable/*' -DestinationPath 'apps/desktop/src-tauri/Codex-X_${version}_windows_x64_portable.zip' -Force"

      - name: Stage release assets
        run: |
          set -euo pipefail
          version=$(node -p "require('./apps/desktop/package.json').version")
          rm -rf release-upload
          mkdir -p release-upload
          case "${{ matrix.name }}" in
            "macOS Apple Silicon")
              dmg=$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)
              updater=$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1)
              test -n "$dmg" && test -n "$updater" && test -f "${updater}.sig"
              cp "$dmg" "release-upload/Codex-X_${version}_macos_apple_silicon_aarch64.dmg"
              cp "$updater" "release-upload/Codex-X_${version}_darwin_aarch64.app.tar.gz"
              cp "${updater}.sig" "release-upload/Codex-X_${version}_darwin_aarch64.app.tar.gz.sig"
              ;;
            "macOS Intel")
              dmg=$(find apps/desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)
              updater=$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1)
              test -n "$dmg" && test -n "$updater" && test -f "${updater}.sig"
              cp "$dmg" "release-upload/Codex-X_${version}_macos_intel_x64.dmg"
              cp "$updater" "release-upload/Codex-X_${version}_darwin_x86_64.app.tar.gz"
              cp "${updater}.sig" "release-upload/Codex-X_${version}_darwin_x86_64.app.tar.gz.sig"
              ;;
            "Windows")
              msi=$(find apps/desktop/src-tauri/target/release/bundle/msi -maxdepth 1 -type f -name '*.msi' | head -n 1)
              updater=$(find apps/desktop/src-tauri/target/release/bundle/msi -maxdepth 1 -type f -name '*.msi.zip' | head -n 1)
              portable="apps/desktop/src-tauri/Codex-X_${version}_windows_x64_portable.zip"
              test -n "$msi" && test -n "$updater" && test -f "${updater}.sig" && test -f "$portable"
              cp "$msi" "release-upload/Codex-X_${version}_windows_x64.msi"
              cp "$updater" "release-upload/Codex-X_${version}_windows_x86_64.msi.zip"
              cp "${updater}.sig" "release-upload/Codex-X_${version}_windows_x86_64.msi.zip.sig"
              cp "$portable" release-upload/
              ;;
            "Linux")
              deb=$(find apps/desktop/src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | head -n 1)
              rpm=$(find apps/desktop/src-tauri/target/release/bundle/rpm -maxdepth 1 -type f -name '*.rpm' | head -n 1)
              test -n "$deb" && test -n "$rpm" && test -f "${deb}.sig" && test -f "${rpm}.sig"
              cp "$deb" "release-upload/Codex-X_${version}_linux_x64.deb"
              cp "${deb}.sig" "release-upload/Codex-X_${version}_linux_x64.deb.sig"
              cp "$rpm" "release-upload/Codex-X_${version}_linux_x64.rpm"
              cp "${rpm}.sig" "release-upload/Codex-X_${version}_linux_x64.rpm.sig"
              ;;
          esac

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-upload/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          tag = os.environ["RELEASE_TAG"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{re.escape(tag)}\].*?\n(.*?)(?=^## \[|\Z)",
              text,
              flags=re.S | re.M,
          )
          body = match.group(1).strip() if match else ""
          if not body:
              body = "Codex-X desktop release."
          with open("release-body.md", "w", encoding="utf-8") as fh:
              fh.write(body + "\n")
          PY

      - name: Prepare update manifests
        run: |
          python3 scripts/prepare_updater_manifests.py \
            --asset-dir release-assets \
            --notes-file release-body.md \
            --repository yynxxxxx/Codex-X \
            --tag "$RELEASE_TAG"

      - name: Validate updater release
        run: |
          python3 scripts/validate_updater_release.py \
            --asset-dir release-assets \
            --repository yynxxxxx/Codex-X \
            --tag "$RELEASE_TAG"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          title="Codex-X ${tag}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file release-body.md --latest
          else
            gh release create "$tag" --title "$title" --notes-file release-body.md --latest
          fi
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.zip' -o -name '*.sig' -o -name 'latest-*.json' \) -print | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          printf 'Uploading %s\n' "${assets[@]}"
          gh release upload "$tag" "${assets[@]}" --clobber

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  frontend-and-updater-config:
    name: Frontend and updater config
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --dir apps/desktop typecheck

      - name: Validate updater configuration
        run: python3 scripts/validate_updater_release.py --config-only

  rust:
    name: Rust (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            platform: macos-latest
          - name: Windows
            platform: windows-latest
          - name: Linux
            platform: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Cargo check
        run: cargo check --locked --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Cargo tests
        if: matrix.platform == 'ubuntu-22.04'
        run: cargo test --locked --manifest-path apps/desktop/src-tauri/Cargo.toml
